log_level: info

# Credentials injected from k8s Secret at startup via initContainer (see livekit-sip-deploy.yaml)
# This file is a template — the initContainer substitutes ${LIVEKIT_API_KEY} and ${LIVEKIT_API_SECRET}
api_key: ${LIVEKIT_API_KEY}
api_secret: ${LIVEKIT_API_SECRET}
ws_url: ws://livekit.ai-voice.svc.cluster.local:7880

redis:
  address: redis.ai-voice.svc.cluster.local:6379
  db: 1

sip_port: 5080
rtp_port: 10000
rtp_port_range_end: 20000

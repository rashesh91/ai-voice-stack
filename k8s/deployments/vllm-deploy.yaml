apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ai-voice
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      runtimeClassName: nvidia
      enableServiceLinks: false
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.6.6
          args:
            - "--model"
            - "Telugu-LLM-Labs/Indic-gemma-7b-finetuned-sft-Navarasa-2.0"
            - "--served-model-name"
            - "indic-gemma"
            - "--dtype"
            - "bfloat16"
            - "--enforce-eager"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--max-model-len"
            - "2048"
            - "--max-num-seqs"
            - "4"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--enable-lora"
            - "--lora-modules"
            - "indic-gemma-ugvcl=/lora-adapter-gemma"
            - "--max-lora-rank"
            - "16"
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /models/hub
            - name: TRANSFORMERS_CACHE
              value: /models/hub
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
          volumeMounts:
            - name: models
              mountPath: /models
            - name: lora-adapter
              mountPath: /lora-adapter-gemma
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "20Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 15
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 240
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: models
          hostPath:
            path: /opt/ai-voice-stack/data/vllm-models
            type: Directory
        - name: lora-adapter
          hostPath:
            path: /opt/ai-voice-stack/data/lora-adapter-gemma
            type: Directory

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ai-voice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.6.6
          args:
            - "--model"
            - "Qwen/Qwen2.5-1.5B-Instruct"
            - "--dtype"
            - "bfloat16"
            - "--enforce-eager"
            - "--gpu-memory-utilization"
            - "0.60"
            - "--max-model-len"
            - "2048"
            - "--enable-lora"
            - "--lora-modules"
            - "voice-agent=/lora-adapter"
            - "--max-lora-rank"
            - "32"
            - "--max-num-seqs"
            - "8"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /models/hub
            - name: TRANSFORMERS_CACHE
              value: /models/hub
          volumeMounts:
            - name: models
              mountPath: /models
            - name: lora-adapter
              mountPath: /lora-adapter
          resources:
            requests:
              cpu: "4"
              memory: "6Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "10Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 150
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models-pvc
        - name: lora-adapter
          hostPath:
            path: /opt/ai-voice-stack/data/lora-adapter
            type: DirectoryOrCreate
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

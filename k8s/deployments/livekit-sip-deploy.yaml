apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-sip
  namespace: ai-voice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit-sip
  template:
    metadata:
      labels:
        app: livekit-sip
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        # Substitute ${LIVEKIT_API_KEY} and ${LIVEKIT_API_SECRET} from Secret into sip.yaml
        - name: config-init
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext
              envsubst < /config-src/sip.yaml > /config/sip.yaml
          env:
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-voice-secrets
                  key: livekit-api-key
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-voice-secrets
                  key: livekit-api-secret
          volumeMounts:
            - name: config-src
              mountPath: /config-src
              readOnly: true
            - name: config
              mountPath: /config
      containers:
        - name: livekit-sip
          image: livekit/sip:latest
          args: ["--config", "/etc/livekit-sip/sip.yaml"]
          ports:
            - containerPort: 5080
              protocol: UDP
              name: sip-udp
            - containerPort: 5080
              protocol: TCP
              name: sip-tcp
          volumeMounts:
            - name: config
              mountPath: /etc/livekit-sip
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 5080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: config-src
          hostPath:
            path: /opt/ai-voice-stack/livekit-sip
            type: Directory
        - name: config
          emptyDir: {}

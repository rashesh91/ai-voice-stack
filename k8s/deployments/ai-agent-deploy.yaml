apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent
  namespace: ai-voice
spec:
  replicas: 1                  # local GPU models (sarvam-2b + parler-tts) load once per process; 1 replica keeps VRAM within 24 GB
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: ai-agent
          image: localhost:5000/ai-agent:latest
          command: ["python", "-m", "src.main"]
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: ai-agent-config
          env:
            - name: SARVAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-voice-secrets
                  key: sarvam-api-key
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-voice-secrets
                  key: livekit-api-key
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-voice-secrets
                  key: livekit-api-secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-voice-secrets
                  key: postgres-password
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
          volumeMounts:
            - name: hf-cache
              mountPath: /models/hub
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
        - name: hf-cache
          hostPath:
            path: /opt/models/hub
            type: DirectoryOrCreate
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

apiVersion: v1
kind: Service
metadata:
  name: livekit
  namespace: ai-voice
spec:
  selector:
    app: livekit
  ports:
    - name: ws
      port: 7880
      targetPort: 7880
      protocol: TCP
    - name: rtc-tcp
      port: 7881
      targetPort: 7881
      protocol: TCP
    - name: sip
      port: 5080
      targetPort: 5080
      protocol: UDP
  type: ClusterIP

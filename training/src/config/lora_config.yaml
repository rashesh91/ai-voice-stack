model:
  base_model: "Qwen/Qwen2.5-3B-Instruct"
  torch_dtype: "bfloat16"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: "/output/lora-adapter"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  max_seq_length: 512
  logging_steps: 5
  save_steps: 100
  fp16: false
  bf16: true
  optim: "adamw_torch"
  dataloader_num_workers: 0

data:
  train_file: "/data/train.jsonl"
  val_split: 0.1

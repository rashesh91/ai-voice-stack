model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  torch_dtype: "bfloat16"

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: "/output/lora-adapter"
  num_train_epochs: 10
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  max_seq_length: 256
  logging_steps: 10
  save_steps: 200
  fp16: false
  bf16: true
  optim: "adamw_torch"
  dataloader_num_workers: 0

data:
  train_file: "/data/train.jsonl"
  val_split: 0.1

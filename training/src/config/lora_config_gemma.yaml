model:
  base_model: "Telugu-LLM-Labs/Indic-gemma-7b-finetuned-sft-Navarasa-2.0"
  torch_dtype: "bfloat16"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: "/output/lora-adapter-gemma"
  num_train_epochs: 5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  max_seq_length: 256
  logging_steps: 10
  save_steps: 100
  fp16: false
  bf16: true
  optim: "adamw_torch"
  dataloader_num_workers: 0
  gradient_checkpointing: true

data:
  train_file: "/data/train_v2.jsonl"
  val_split: 0.05
